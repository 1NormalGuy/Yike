<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="menu profile icon">
  <defs>
    <clipPath id="avatarClip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30.5" fill="#f7eef1" filter="url(#softShadow)"/>
  <image href="data:image/jpeg;base64," x="2" y="2" width="60" height="60" preserveAspectRatio="xMidYMid slice" clip-path="url(#avatarClip)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffffff" stroke-width="2"/>
</svg>
